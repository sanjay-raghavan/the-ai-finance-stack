# AR Follow-Up — config.yaml

name: ar-follow-up
handle: "@ar-follow-up"
version: 0.1.0
description: Tracks AR aging, drafts tone-matched collection emails, validates rev-rec schedules, produces monthly cohort metrics.
tagline: "Your AR specialist — daily aging, tone-aware collection drafts, rev-rec validation, cohort metrics."
author: Sanjay Raghavan
license: MIT
homepage: https://thefinancestack.com/agents/ar-follow-up
category: Finance & Accounting
pack: core
tags: [ar, accounts-receivable, collections, dso, revenue-recognition]

toolkit: [Read, Write, Glob, Grep, Bash]

mcps:
  required:
    - one_of: [quickbooks, xero, netsuite]
    - slack
  optional:
    - stripe          # subscription billing
    - chargebee       # subscription billing alt
    - paypal          # processor
    - square          # processor
    - hubspot         # CRM for contract context
    - gmail           # to draft (not send) collection emails

finance_plugin_skills:
  required: []
  optional:
    - finance:financial-statements   # cohort metrics formatting

# Shared skills from The AI Finance Stack's skill layer (see /skills/README.md)
# Note: AR Follow-Up doesn't propose JEs directly in v0.1 (write-offs escalate to
# Controller). When AR proposes adjustments in v0.2, add stack:proposal-format.
stack_skills:
  required:
    - stack:slack-conventions        # channel routing for #ar-ops + #finance-alerts
  optional: []

global_skills: [sop-pdf, sop-pptx, sop-xlsx, sop-docx]

skills:
  - aging-analysis
  - collection-drafts

schedule:
  daily:
    aging_refresh:
      cron: "0 8 * * 1-5"      # weekday 8am ET
      timezone: America/New_York
  weekly:
    collections_digest:
      cron: "0 9 * * 2"        # Tuesday 9am
      timezone: America/New_York
  monthly:
    cohort_metrics:
      cron: "0 9 5 * *"        # Day 5 of new period
      timezone: America/New_York
    rev_rec_check:
      cron: "0 8 1 * *"        # Day 1 of close — feeds Controller
      timezone: America/New_York

goals:
  primary:
    - Daily aging delivered by 8:30am ET
    - Weekly collection drafts delivered Tuesday 9:30am ET, tone-matched
    - Zero collection messages sent directly to customers
    - Rev-rec discrepancies surfaced to Controller before close
    - Monthly cohort metrics delivered by Day 5
  metrics:
    - aging_on_time_count
    - collection_drafts_count
    - direct_send_violations         # target: 0
    - rev_rec_discrepancies_caught
    - dso_trend

thresholds:
  customer_concentration_pct: 40        # surface if any customer >40% of AR
  aged_90_plus_dollar_threshold: 5000   # 90+ items above this go to alerts
  dso_deterioration_days: 5             # rolling-90 DSO change worth flagging
  rev_rec_discrepancy_dollar_threshold: 10000
  good_band_payment_ontime_pct: 90
  standard_band_payment_ontime_pct: 70
  customer_history_minimum_invoices: 3   # below this, default to Good band + flag

outputs:
  aging_dir: "ar/{year}-{month:02d}/"
  drafts_dir: "ar/{year}-{month:02d}/drafts/"
  cohort_dir: "ar/cohorts/{year}-{month:02d}/"
  rev_rec_path: "ar/{year}-{month:02d}/rev-rec-check.md"

model:
  provider: anthropic
  name: claude-opus-4
  max_tokens: 8000
  temperature: 0.4   # Higher than others — collection drafts need voice variation per tone band

notifications:
  slack:
    channels:
      summary: "#ar-ops"
      alerts: "#finance-alerts"
  on_aging_change_to_late_bucket: summary
  on_dispute_event: alerts
  on_rev_rec_discrepancy: alerts
  on_concentration_breach: summary

logging:
  level: info
  retain_days: 730
  log_dir: "~/finance-logs/ar-follow-up/"

audit:
  enable: true
  log_path: "~/finance-data/audit/ar-follow-up-audit-log.jsonl"

# AR Follow-Up feeds Controller (rev-rec validation), Treasury (aging → 13-week projection),
# FP&A (cohort metrics), and IR (NRR + churn for monthly update).
