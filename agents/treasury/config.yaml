# Treasury — config.yaml

# ─── Identity ──────────────────────────────────────────────────
name: treasury
handle: "@treasury"
version: 0.1.0
description: Owns visibility into the company's cash. Tracks operating cash vs. merchant float, projects 13 weeks forward, calculates runway with confidence bands, surfaces cash-risk alerts.
tagline: "Your senior treasurer — hourly cash position, 13-week projection, runway with confidence bands, never confuses operating cash with merchant float."
author: Sanjay Raghavan
license: MIT
homepage: https://thefinancestack.com/agents/treasury
category: Finance & Accounting
tags:
  - treasury
  - cash-management
  - runway
  - merchant-float
  - psp-aware

# ─── Base toolkit (Claude Code defaults) ────────────────────────
toolkit:
  - Read
  - Write
  - Glob
  - Grep
  - Bash

# ─── Required MCPs ──────────────────────────────────────────────
mcps:
  required:
    - one_of: [mercury, modern-treasury, plaid]   # at least one banking source
    - slack
  optional:
    - stripe         # required for PSP merchant-float separation
    - paypal         # required for PSP merchant-float separation
    - square         # required for PSP merchant-float separation
    - quickbooks     # for historical context / opening balances
    - xero           # alternative accounting MCP
    - netsuite       # alternative accounting MCP
    - notion-finance # for known-events.yaml and the weekly runway report archive

# ─── Required Finance Plugin skills ─────────────────────────────
# Treasury does not depend on the Finance Plugin skills directly — its work is
# data-driven (banking + processor APIs) rather than methodology-driven.
finance_plugin_skills:
  required: []
  optional:
    - finance:financial-statements   # used in weekly runway report formatting

# ─── Shared skills from The AI Finance Stack's skill layer ──────
# See /skills/README.md. Treasury is read-only on the GL — no proposal-format
# needed. stack:kpi-snapshot and stack:driver-decomposition queued for v0.2.
stack_skills:
  required:
    - stack:slack-conventions        # channel routing for #treasury-ops + #finance-alerts
  optional: []

# ─── Inherited "Global Default" skills ──────────────────────────
global_skills:
  - sop-pdf
  - sop-pptx
  - sop-xlsx
  - sop-docx

# ─── Agent-specific skills ──────────────────────────────────────
skills:
  - cash-position-snapshot
  - thirteen-week-projection
  - runway-calc

# ─── Schedule ───────────────────────────────────────────────────
schedule:
  hourly:
    cash_snapshot:
      # Every hour during business hours
      cron: "0 8-18 * * 1-5"
      timezone: America/New_York
  daily:
    projection_refresh:
      cron: "0 6 * * 1-5"        # 6am, weekdays
      timezone: America/New_York
      depends_on:
        - ar-follow-up           # consumes AR aging output
        - ap-watcher             # consumes AP payment-run forecast
        - payroll-reviewer       # consumes payroll schedule
  weekly:
    runway_report:
      cron: "0 16 * * 5"          # Friday 4pm
      timezone: America/New_York
  monthly:
    board_pack_input:
      cron: "0 10 4 * *"          # Day 4 of each month, 10am — feeds IR's monthly update
      timezone: America/New_York
  always_on:
    # The cash-risk watcher runs continuously, evaluating each new hourly
    # snapshot and projection refresh against thresholds.
    cash_risk_watcher: enabled

# ─── Goals (success metrics) ────────────────────────────────────
goals:
  primary:
    - Hourly cash snapshot delivered on time, >99% of business hours
    - 13-week projection refreshed every business day by 6:30am ET
    - Weekly runway report delivered every Friday by 4:30pm ET
    - 100% of cash-risk threshold breaches surfaced within 5 minutes of detection
    - Zero conflations of operating cash with merchant settlement float
  metrics:
    - hourly_snapshot_uptime_pct
    - projection_refresh_latency_minutes
    - runway_report_on_time_count
    - threshold_breach_alerts_count
    - merchant_float_separation_violations  # target: 0, every breach is a critical bug

# ─── Cash thresholds and alert criteria ─────────────────────────
thresholds:
  operating_cash_cushion_days: 60        # alert if operating cash drops below 60 days of expense run-rate
  projected_zero_crossing_window_weeks: 13  # alert if projection crosses $0 within this window
  bear_case_runway_critical_months: 6
  unhedged_fx_exposure_dollar_threshold: 500000
  covenant_compliance_warning_days: 30   # warn 30 days before covenant test
  single_day_cash_movement_pct: 10       # surface unexplained moves >10% of operating cash
  daily_burn_anomaly_stdevs: 2           # surface if a day's burn is >2 stdevs from trailing average

# ─── Confidence band methodology ────────────────────────────────
runway_confidence_bands:
  method: trailing_period_variability
  trailing_months: 3
  lower_bound: worst_burn_month_in_window
  upper_bound: best_burn_month_in_window
  # The CFO sees a range, not a point.

# ─── PSP-specific configuration ─────────────────────────────────
# Set to false for non-PSP businesses. For Strand (and any PSP), TRUE.
psp_aware:
  enabled: true
  merchant_settlement_account_ids:
    # List of account IDs that hold merchant funds, never operating cash
    # These will be queried from Stripe / PayPal / Square / your processor MCP
    - "stripe:platform"
    - "stripe:connect"
  # Float is reported but never counts toward runway or operating-cash calculations

# ─── Output paths ───────────────────────────────────────────────
outputs:
  hourly_base_dir: "cash/{year}-{month:02d}/hourly/"
  projection_base_dir: "cash/{year}-{month:02d}/"
  runway_base_dir: "runway/"
  ir_input_path: "ir/{year}-{month:02d}/treasury-input.md"

# ─── Model configuration ────────────────────────────────────────
model:
  provider: anthropic
  name: claude-opus-4
  max_tokens: 6000
  temperature: 0.1    # Treasury work is the most numerical agent — minimize creativity

# ─── Notifications ──────────────────────────────────────────────
notifications:
  slack:
    channels:
      summary: "#treasury-ops"
      alerts: "#finance-alerts"
  on_hourly_snapshot: summary   # one-line heartbeat
  on_threshold_breach: alerts
  on_projection_zero_crossing: alerts
  on_runway_critical: alerts
  on_snapshot_failure: alerts

# ─── Logging ────────────────────────────────────────────────────
logging:
  level: info
  retain_days: 730        # 2-year retention — Treasury history matters for audit
  log_dir: "~/finance-logs/treasury/"

# ─── Audit ──────────────────────────────────────────────────────
audit:
  enable: true
  log_path: "~/finance-data/audit/treasury-audit-log.jsonl"
  # Every cash query, every threshold evaluation, every alert appended.

# ─── Dependencies ───────────────────────────────────────────────
agent_dependencies:
  - ar-follow-up        # for AR aging input to 13-week projection
  - ap-watcher          # for AP payment-run forecast
  - payroll-reviewer    # for payroll schedule
  # Treasury degrades gracefully if any of these are missing — projection runs
  # with available data and flags the missing inputs in Methodology.
